{% extends 'ecommerce/base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<section class="section-sm">
  <div class="container">
    <div class="form-card" style="max-width:540px;">
      <h2 class="form-title">Edit Profile</h2>
      <p class="form-subtitle">Update your personal information</p>
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" value="{{ form.fields.first_name.initial|default:user.first_name }}">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" value="{{ form.fields.last_name.initial|default:user.last_name }}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ user.email }}">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ user.profile.phone }}">
        </div>
        <div class="form-group">
          <label class="form-label">Profile Picture</label>
          <input type="file" name="avatar" class="form-control">
        </div>
        <div style="display:flex;gap:1rem;">
          <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
          <a href="/dashboard/" class="btn btn-outline btn-full">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}

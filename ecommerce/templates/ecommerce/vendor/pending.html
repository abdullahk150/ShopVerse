{% extends 'ecommerce/base.html' %}
{% block title %}Pending Approval{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="max-width:600px;">
    <div style="background:var(--white);border-radius:var(--radius-lg);padding:3rem;box-shadow:var(--shadow);text-align:center;">
      <div style="font-size:4rem;margin-bottom:1rem;">⏳</div>
      <h2 style="font-family:var(--font-display);font-size:1.75rem;margin-bottom:0.75rem;">Approval Pending</h2>
      <p style="color:var(--gray-600);margin-bottom:1.5rem;">Your store <strong>{{ vendor.store_name }}</strong> is currently awaiting admin approval. You'll be able to list products once approved.</p>
      <span class="status-badge status-pending" style="font-size:0.9rem;padding:0.5rem 1.25rem;">Status: Pending</span>
      <div style="margin-top:2rem;"><a href="/" class="btn btn-outline">← Back to Home</a></div>
    </div>
  </div>
</section>
{% endblock %}
